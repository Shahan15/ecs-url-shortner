name: Docker Build and Push Image

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "services/dashboard/**"
      - "services/worker/**"

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.path-changes.outputs.app }}
      dashboard: ${{ steps.path-changes.outputs.dashboard }}
      worker: ${{ steps.path-changes.outputs.worker }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check changes paths
        id: path-changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app:
              - 'app/**'
            dashboard:
              - 'services/dashboard/**'
            worker:
              - 'services/worker/**'

  deploy:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: app
            context: ./app
            service: url-short-src-ecs-service
            container: url-src-container
            task-definition-family: url-src-td
            tag: src

          - id: dashboard
            context: ./services/dashboard
            service: url-short-dashboard-ecs-service
            container: url-dashboard-container
            task-definition-family: url-dashboard-td
            tag: dashboard

          - id: worker
            context: ./services/worker
            service: url-short-worker-ecs-service
            container: url-worker-container
            task-definition-family: url-worker-td
            tag: worker

    steps:
      # Check if service should run/deploy
      - name: Filter matrix job
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN="true"
          else
            SHOULD_RUN="${{ needs.changes.outputs[matrix.id] }}"
          fi
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

      - name: Checkout Code
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/checkout@v4

      # Authenticate CLI with OIDC
      - name: Configure AWS Credentials
        if: steps.filter.outputs.should_run == 'true'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: eu-west-1

      # Log into ECR
      - name: Log into ECR
        if: steps.filter.outputs.should_run == 'true'
        id: login-into-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v4

      # Tag and build the image
      - name: Tag, Build + Push Image
        if: steps.filter.outputs.should_run == 'true'
        id: build-image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/arm64
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.login-into-ecr.outputs.registry }}/url-shortner:${{ matrix.tag }}-${{ github.sha }}

      - name: Fill in the new image ID in the Amazon ECS task definition
        if: steps.filter.outputs.should_run == 'true'
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ matrix.task-definition-family }}
          container-name: ${{ matrix.container }}
          image: ${{ steps.login-into-ecr.outputs.registry }}/url-shortner:${{ matrix.tag }}-${{ github.sha }}

      - name: Deploy to Amazon ECS
        if: steps.filter.outputs.should_run == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ matrix.service }}
          cluster: url-short-ecs-cluster
          wait-for-service-stability: true
